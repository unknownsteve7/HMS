<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sanskrithi Hostel Management System - Book and manage hostel rooms" />
    <meta name="theme-color" content="#5E42ED" />
    <base href="/" />
    
    <title>Sanskrithi Hostel Management</title>
    <link rel="icon" type="image/x-icon" href="/svgviewer-png-output.ico" />
    <!-- <script src="https://cdn.tailwindcss.com/3.4.17"></script> -->
    <script src="https://cdn.tailwindcss.com/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              'primary-purple': '#5E42ED',
              'primary-purple-light': '#8B6DFF',
              'accent-orange': '#FF8C00',
              'accent-cyan': '#20C8B7',
              'text-dark': '#1A202C',
              'text-medium': '#4A5568',
              'text-light': '#FFFFFF',
              'base-bg': '#F1F5F9',
              'subtle-border': '#E2E8F0',
            },
            boxShadow: {
              'soft-ui': '6px 6px 16px rgba(203, 213, 225, 0.7), -6px -6px 16px rgba(255, 255, 255, 1)',
              'soft-ui-inset': 'inset 6px 6px 16px rgba(203, 213, 225, 0.7), inset -6px -6px 16px rgba(255, 255, 255, 1)',
              'soft-ui-sm': '3px 3px 8px rgba(203, 213, 225, 0.7), -3px -3px 8px rgba(255, 255, 255, 1)',
              'soft-ui-sm-inset': 'inset 3px 3px 8px rgba(203, 213, 225, 0.7), inset -3px -3px 8px rgba(255, 255, 255, 1)',
            }
          }
        }
      }
    </script>
  </head>
  <body class="text-text-dark bg-base-bg">
    <div id="root"></div>
    <script type="module" src="/index.jsx"></script>
  </body>

</html>
